<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Кабинеты платформы · ПИШ ЦИ БАС</title>
  <meta name="description" content="Кликабельный прототип кабинетов: студент, преподаватель, РОП, директор.">
  <link rel="icon" type="image/png" href="assets/img/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <script>(function(){var t;try{t=localStorage.getItem("theme")}catch(e){}document.documentElement.setAttribute("data-theme",t==="dark"?"dark":"light")})();</script>
  <link rel="stylesheet" href="assets/theme.css">
  <style>
    .roleswitch{ position:sticky; top:62px; z-index:40; background:var(--bg-2); border-bottom:1px solid var(--line); }
    .rs-in{ width:min(1180px,92vw); margin-inline:auto; display:flex; gap:.4rem; overflow-x:auto; padding:.7rem 0; }
    .rtab{ font-family:var(--mono); font-size:var(--t-sm); padding:.55rem 1rem; border-radius:var(--radius);
      border:1px solid var(--line-2); background:transparent; color:var(--text-mut); cursor:pointer; white-space:nowrap;
      transition:all var(--dur) var(--ease); display:flex; gap:.5rem; align-items:center; }
    .rtab:hover{ color:var(--text); border-color:var(--cyan-dim); }
    .rtab.on{ background:var(--cyan); color:var(--on-accent); border-color:var(--cyan); font-weight:600; }

    .view{ padding-block:2rem 4rem; }
    .vhead{ margin-bottom:1.6rem; }
    .vhead h1{ font-size:var(--t-h1); }

    .cols{ display:grid; gap:1rem; }
    .c2{ grid-template-columns:1.4fr 1fr; } .c3{ grid-template-columns:repeat(3,1fr); }
    @media(max-width:880px){ .c2,.c3{ grid-template-columns:1fr; } }

    .card{ padding:1.2rem; }
    .card h3{ font-size:var(--t-h3); margin-bottom:.9rem; display:flex; justify-content:space-between; align-items:center; gap:.5rem; }
    .li{ display:flex; gap:.7rem; align-items:baseline; padding:.55rem 0; border-bottom:1px solid var(--line); }
    .li:last-child{ border-bottom:none; }
    .li .tm{ font-family:var(--mono); font-size:var(--t-xs); color:var(--cyan-dim); flex:none; width:64px; }
    .li .tag{ margin-left:auto; }

    .kpi{ display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
    @media(max-width:720px){ .kpi{ grid-template-columns:repeat(2,1fr); } }
    .kpi .k{ padding:1.1rem; } .kpi .n{ font-family:var(--mono); font-size:1.9rem; color:var(--cyan); font-weight:600; }
    .kpi .l{ font-size:var(--t-sm); color:var(--text-mut); margin-top:.3rem; }

    /* тепловая карта */
    .heat{ width:100%; border-collapse:collapse; font-size:var(--t-sm); }
    .heat th,.heat td{ padding:.5rem .6rem; text-align:center; border:1px solid var(--line); }
    .heat th:first-child,.heat td:first-child{ text-align:left; font-family:var(--mono); font-size:var(--t-xs); }
    .cell{ width:34px; height:22px; border-radius:3px; display:inline-block; }

    /* radar */
    .radar-wrap{ display:flex; gap:1.5rem; align-items:center; flex-wrap:wrap; }

    /* чат */
    .chat{ display:flex; flex-direction:column; gap:.8rem; }
    .msg{ padding:.8rem 1rem; border-radius:var(--radius-lg); max-width:88%; font-size:var(--t-sm); line-height:1.5; }
    .msg.ai{ background:var(--surface-2); border:1px solid var(--line); align-self:flex-start; }
    .msg.u{ background:color-mix(in oklab, var(--brand) 14%, transparent); border:1px solid var(--cyan-dim); align-self:flex-end; }
    .radar-grid{ stroke:var(--line-2); fill:none; }
    .radar-axis{ fill:var(--text-mut); }
    .radar-poly{ fill:color-mix(in oklab, var(--brand) 22%, transparent); stroke:var(--cyan); }
    .radar-dot{ fill:var(--cyan); }
    .msg .who{ font-family:var(--mono); font-size:var(--t-xs); color:var(--cyan-dim); margin-bottom:.3rem; }
    .qchips{ display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.6rem; }
    .qchip{ font-size:var(--t-xs); font-family:var(--mono); padding:.35rem .7rem; border:1px solid var(--line-2);
      border-radius:100px; background:transparent; color:var(--text-mut); cursor:pointer; }
    .qchip:hover{ border-color:var(--cyan-dim); color:var(--cyan); }

    /* чек-лист V&V */
    .vv{ display:flex; flex-direction:column; gap:.5rem; }
    .vvrow{ display:flex; gap:.6rem; align-items:center; padding:.5rem .7rem; border:1px solid var(--line); border-radius:var(--radius); }
    .vvrow .box{ width:18px;height:18px;border-radius:3px;border:1.5px solid var(--line-2); flex:none; display:grid; place-items:center; cursor:pointer; font-size:.8rem; }
    .vvrow.done .box{ background:var(--ok); border-color:var(--ok); color:var(--on-accent); }
    .vvrow.done span{ color:var(--text-mut); }

    .note{ font-size:var(--t-xs); color:var(--text-dim); font-family:var(--mono); }
    .toggle{ width:38px;height:22px;border-radius:100px;background:var(--surface-2);border:1px solid var(--line-2);position:relative;cursor:pointer; flex:none; }
    .toggle::after{ content:"";position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--text-dim);transition:all var(--dur) var(--ease); }
    .toggle.on{ background:var(--cyan); border-color:var(--cyan); }
    .toggle.on::after{ left:18px; background:var(--on-accent); }
    .demo-banner{ font-family:var(--mono);font-size:var(--t-xs);color:var(--amber);border:1px dashed var(--amber);
      border-radius:var(--radius);padding:.5rem .8rem;display:inline-block; }

    /* дисциплины студента */
    .disc-cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(240px,1fr)); gap:1rem; }
    .dcard{ padding:1.1rem; cursor:pointer; transition:transform var(--dur) var(--ease),border-color var(--dur) var(--ease); }
    .dcard:hover{ transform:translateY(-3px); border-color:var(--cyan-dim); }
    .dcard .dc-code{ font-family:var(--mono); font-size:var(--t-xs); color:var(--cyan-dim); }
    .dcard .dc-nm{ font-weight:560; line-height:1.25; margin-top:.35rem; min-height:2.6em; }
    .dcard .dc-foot{ display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.8rem; }
    .btn-sm{ padding:.45rem .8rem; font-size:var(--t-xs); }

    /* детальная дисциплина */
    .stub{ display:flex; gap:1rem; align-items:flex-start; }
    .stub-ic{ font-size:2rem; color:var(--text-dim); line-height:1; }
    .syl{ display:flex; flex-direction:column; gap:.3rem; margin-top:.4rem; }
    .syl-row{ display:grid; grid-template-columns:26px 22px 1fr auto; gap:.7rem; align-items:center;
      padding:.55rem .6rem; border:1px solid var(--line); border-radius:var(--radius); }
    .syl-row.filled{ cursor:pointer; border-color:var(--brand-2); background:color-mix(in oklab,var(--brand-2) 6%,transparent); }
    .syl-row.filled:hover{ background:color-mix(in oklab,var(--brand-2) 12%,transparent); }
    .syl-row.soon{ opacity:.62; }
    .syl-n{ font-family:var(--mono); font-size:var(--t-xs); color:var(--text-dim); text-align:center; }
    .syl-b{ font-family:var(--mono); font-weight:700; font-size:var(--t-xs); text-align:center; color:var(--cyan-dim); }
    .syl-txt{ font-size:var(--t-sm); line-height:1.3; }
    .mat-cat{ font-family:var(--cond); text-transform:uppercase; letter-spacing:.1em; font-size:var(--t-xs);
      color:var(--cyan-dim); margin:1.1rem 0 .5rem; }
    .mat-row{ display:flex; gap:.8rem; align-items:center; padding:.6rem 0; border-bottom:1px solid var(--line); }
    .mat-row:last-child{ border-bottom:none; }
    .mat-info{ flex:1; min-width:0; }
    .mat-size{ font-size:var(--t-xs); white-space:nowrap; }
    .ftype{ font-family:var(--mono); font-size:.62rem; font-weight:700; letter-spacing:.05em;
      color:var(--fc); border:1px solid var(--fc); border-radius:3px; padding:.2rem .35rem; flex:none; width:52px; text-align:center; }

    /* overlay + читалка + тест */
    .disc-ov{ position:fixed; inset:0; background:var(--scrim); backdrop-filter:blur(4px); z-index:120;
      display:flex; align-items:flex-start; justify-content:center; padding:2.5rem 1rem; overflow:auto; }
    .reader{ width:min(760px,96vw); padding:1.8rem clamp(1.2rem,3vw,2.6rem); position:relative; }
    .rd-x{ position:absolute; top:1rem; right:1rem; background:none; border:none; color:var(--text-mut); font-size:1.4rem; cursor:pointer; z-index:2; }
    .rd-head{ border-bottom:2px solid var(--line-2); padding-bottom:1.2rem; margin-bottom:1.4rem; }
    .rd-title{ font-size:clamp(1.6rem,1rem+2vw,2.3rem); margin-top:.4rem; }
    .reader-body{ font-size:1.02rem; line-height:1.7; }
    .rd-h2{ font-size:1.45rem; margin:1.8rem 0 .7rem; color:var(--brand); }
    :root[data-theme="dark"] .rd-h2{ color:var(--cyan); }
    .rd-h3{ font-size:1.15rem; margin:1.2rem 0 .5rem; }
    .rd-p{ margin:.5rem 0 .9rem; }
    .rd-formula{ font-family:"Cambria Math","Times New Roman",serif; font-size:1.15rem; text-align:center;
      padding:.9rem 1rem; margin:1rem 0; background:var(--surface-2); border-left:3px solid var(--brand); border-radius:var(--radius); overflow-x:auto; }
    .rd-note{ font-size:var(--t-sm); color:var(--text-mut); background:var(--bg-2); border-left:3px solid var(--cyan-dim);
      padding:.7rem .9rem; margin:1rem 0; border-radius:var(--radius); }
    .rd-ex{ font-size:var(--t-sm); background:color-mix(in oklab,var(--brand-2) 9%,transparent);
      border-left:3px solid var(--brand-2); padding:.7rem .9rem; margin:1rem 0; border-radius:var(--radius); }
    .rd-list{ margin:.6rem 0 1rem 1.2rem; } .rd-list li{ margin:.35rem 0; }
    .rd-tablewrap{ overflow-x:auto; margin:1.1rem 0; }
    .rd-table{ width:100%; border-collapse:collapse; font-size:var(--t-sm); }
    .rd-table th,.rd-table td{ border:1px solid var(--line); padding:.5rem .6rem; text-align:left; vertical-align:top; }
    .rd-table th{ background:var(--surface-2); font-family:var(--cond); }

    .quiz-score{ font-family:var(--mono); font-size:var(--t-sm); color:var(--cyan); margin-top:.9rem; }
    .quiz-q{ padding:1rem 0; border-bottom:1px solid var(--line); }
    .quiz-qh{ display:flex; gap:.6rem; font-weight:560; }
    .quiz-num{ font-family:var(--mono); color:var(--cyan-dim); flex:none; }
    .quiz-opts{ display:flex; flex-direction:column; gap:.4rem; margin:.8rem 0 0 1.6rem; }
    .quiz-opt{ text-align:left; padding:.55rem .8rem; border:1px solid var(--line-2); border-radius:var(--radius);
      background:transparent; color:var(--text); cursor:pointer; font-size:var(--t-sm); transition:all var(--dur) var(--ease); }
    .quiz-opt:hover:not(:disabled){ border-color:var(--cyan-dim); }
    .quiz-opt.ok{ border-color:var(--ok); background:color-mix(in oklab,var(--ok) 14%,transparent); }
    .quiz-opt.bad{ border-color:var(--risk); background:color-mix(in oklab,var(--risk) 12%,transparent); }
    .quiz-expl{ margin:.7rem 0 0 1.6rem; font-size:var(--t-sm); color:var(--text-mut); }
  </style>
</head>
<body>
  <main>
    <div class="roleswitch">
      <div class="rs-in" id="roles"></div>
    </div>
    <section class="wrap view" id="view"></section>
  </main>

  <script src="assets/data.js"></script>
  <script src="assets/glossary.js"></script>
  <script src="assets/ui.js"></script>
  <script src="assets/tooltips.js"></script>
  <script src="assets/course-vm.js"></script>
  <script src="assets/lecture-cfd.js"></script>
  <script src="assets/discipline.js"></script>
  <script>
    const D = window.DATA;
    mountNav("app.html");

    const ROLES=[
      ["student","🎓 Студент"],["teacher","📐 Преподаватель"],
      ["rop","🗂 РОП"],["dir","📊 Директор"]
    ];
    let cur="student";
    const rbox=document.getElementById("roles");
    ROLES.forEach(([k,l])=>rbox.append(el("button",{class:"rtab"+(k===cur?" on":""),"data-r":k,
      onclick:()=>{cur=k;studentDisc=null;syncR();render();}},l)));
    function syncR(){ rbox.querySelectorAll(".rtab").forEach(b=>b.classList.toggle("on",b.dataset.r===cur)); }

    const V=document.getElementById("view");
    function head(k,t,s){ return el("div",{class:"vhead"}, el("div",{class:"kicker"},k),
      el("h1",{class:"mt-s"},t), s?el("p",{class:"muted mt-s"},s):null); }
    function card(title,extra,...kids){ return el("div",{class:"panel card hud"},
      el("h3",{},el("span",{},title),extra||null),...kids); }

    let studentDisc = null;
    window.openDiscipline = function(code){ studentDisc = code; render(); window.scrollTo(0,0); };
    function backToStudent(){ studentDisc = null; render(); window.scrollTo(0,0); }

    function render(){
      V.innerHTML="";
      if(cur==="student" && studentDisc){ V.append(buildDisciplineDetail(studentDisc, backToStudent)); if(window.annotateTerms) annotateTerms(V); return; }
      ({student:vStudent,teacher:vTeacher,rop:vRop,dir:vDir}[cur])();
    }
    // сброс детали при смене роли
    ROLES.forEach(([k])=>{}); // (переключение роли уже вызывает render через rtab)

    // секция «Мои дисциплины» (семестр 1)
    function studentDiscSection(){
      const list = D.D.filter(d=>d.sem===1 && !d.code.startsWith("ФТД")).slice(0,8);
      const grid = el("div",{class:"disc-cards"});
      list.forEach(d=>{
        const hasMat = d.code===COURSE_VM.code;
        grid.append(el("div",{class:"panel dcard",onclick:()=>openDiscipline(d.code)},
          el("div",{class:"dc-code"},d.code),
          el("div",{class:"dc-nm"},d.name),
          el("div",{class:"dc-foot"},
            el("span",{class:"chip"},d.ze+" з.е."),
            d.core?el("span",{class:"chip",style:"color:var(--amber)"},"расч. ядро"):null,
            hasMat?el("span",{class:"chip",style:"color:var(--brand-2)"},el("i",{class:"dot"}),"материалы"):null)));
      });
      return el("div",{class:"panel card hud",style:"margin-bottom:1rem"},
        el("h3",{}, el("span",{},"Мои дисциплины · семестр 1"),
          el("span",{class:"chip",style:"color:var(--cyan-dim)"},"клик — материалы и лекции")),
        grid);
    }

    /* ——— СТУДЕНТ ——— */
    function vStudent(){
      V.append(head("Личный кабинет · Ковалёв А., команда «Стриж»","Сегодня, среда","Роль в команде: расчётчик · Стадия проекта: С1 — замысел и аванпроект"));
      // KPI
      V.append(el("div",{class:"kpi",style:"margin-bottom:1rem"},
        kpi("3","занятия сегодня"), kpi("2","дедлайна Moodle"),
        kpi("34%","прогресс проекта"), kpi("58%","компетенции С1")));
      // Мои дисциплины (семестр 1)
      V.append(studentDiscSection());
      // 2 колонки
      V.append(el("div",{class:"cols c2"},
        el("div",{class:"cols",style:"gap:1rem"},
          card("Лента дня · единый календарь", el("span",{class:"note"},"очное + Moodle + проект"),
            liItem("09:00","Лекция · Вычислительная механика (К.М.02.01.02)","аудитория","var(--cyan)"),
            liItem("11:00","Практикум · первая КЭ-модель узла","проект","var(--amber)"),
            liItem("14:00","Moodle · тест по теории упругости","дедлайн","var(--rose)"),
            liItem("16:00","Бронь: разрывная машина, лаб. ОКБ","площадка","var(--lime)")),
          card("Мой проект · артефакты С1", el("a",{href:"tracker.html",class:"chip"},"трекер →"),
            ...D.ARTIFACTS.filter(a=>a.sem===1).map((a,i)=>
              el("div",{class:"li"},
                el("span",{class:"tm"},a.disc.replace("К.М.","")),
                el("span",{},a.art),
                el("span",{class:"tag chip",style:"color:"+(i<3?"var(--ok)":"var(--text-dim)")},
                  el("i",{class:"dot"}),i<3?"принят":"в работе"))))),
        el("div",{class:"cols",style:"gap:1rem"},
          card("Компетенции · радар 7 направлений", null, radar()),
          card("ИИ-тьютор", el("span",{class:"chip",style:"color:var(--cyan-dim)"},"честный контур"), chat())
        )));
    }
    function kpi(n,l){ return el("div",{class:"panel k"}, el("div",{class:"n"},n), el("div",{class:"l"},l)); }
    function liItem(tm,txt,tag,c){ return el("div",{class:"li"},
      el("span",{class:"tm"},tm), el("span",{},txt),
      el("span",{class:"tag chip",style:"color:"+c}, el("i",{class:"dot"}), tag)); }

    function radar(){
      const axes=["Аэродинамика","Нагрузки","Прочность","Композиты","ИИ/данные","Цифр. двойник","Оптимизация"];
      const vals=[.5,.35,.7,.4,.55,.6,.45];
      const cx=120,cy=120,R=90,N=axes.length;
      const pt=(i,r)=>[cx+r*Math.cos(-Math.PI/2+i*2*Math.PI/N), cy+r*Math.sin(-Math.PI/2+i*2*Math.PI/N)];
      let grid="",poly="",labels="";
      [.25,.5,.75,1].forEach(g=>{ let p=axes.map((_,i)=>pt(i,R*g).join(",")).join(" ");
        grid+=`<polygon points="${p}" class="radar-grid" stroke-width=".5"/>`; });
      poly=axes.map((_,i)=>pt(i,R*vals[i]).join(",")).join(" ");
      axes.forEach((a,i)=>{ const[x,y]=pt(i,R+16);
        labels+=`<text x="${x}" y="${y}" class="radar-axis" font-size="8" text-anchor="middle" font-family="var(--mono)">${a}</text>`; });
      const svg=`<svg viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="радар компетенций">
        ${grid}<polygon points="${poly}" class="radar-poly" stroke-width="1.5"/>
        ${axes.map((_,i)=>{const[x,y]=pt(i,R*vals[i]);return `<circle cx="${x}" cy="${y}" r="2.5" class="radar-dot"/>`}).join("")}
        ${labels}</svg>`;
      return el("div",{class:"radar-wrap"}, rawSvg(svg),
        el("div",{}, el("div",{class:"note"},"подтверждается артефактами,"),
          el("div",{class:"note"},"не самооценкой"),
          el("div",{class:"chip mt-m",style:"color:var(--amber)"},"разрыв: нагрузки, композиты")));
    }

    function chat(){
      const wrap=el("div",{class:"chat"});
      const feed=el("div",{class:"chat"});
      wrap.append(feed);
      addMsg(feed,"ai","Тьютор","Разберём диаграмму V-n для твоего изделия? Могу объяснить построение огибающей нагрузок и проверить твой ход — но посчитаешь ты сам.");
      const q=["Объясни, откуда берётся n_max","Построй формулу маневренной перегрузки","Проверь мой расчёт скорости сваливания"];
      const chips=el("div",{class:"qchips"}, ...q.map(t=>el("button",{class:"qchip",onclick:()=>{
        addMsg(feed,"u","Студент",t);
        setTimeout(()=>addMsg(feed,"ai","Тьютор",aiReply(t)),250);
      }},t)));
      wrap.append(chips);
      return wrap;
    }
    function addMsg(feed,who,name,txt){ feed.append(el("div",{class:"msg "+who},
      el("div",{class:"who"},name), el("span",{},txt))); }
    function aiReply(t){
      if(t.includes("n_max")) return "n_max задаётся нормами лётной годности для класса БАС и расчётным случаем маневра. Смотри владельца темы — «Полётные и наземные нагрузки» (К.М.02.03.02). Попробуй сам найти класс своего изделия по массе — какой у «Стрижа»?";
      if(t.includes("формулу")) return "Маневренная перегрузка: n = L / (m·g), где L — подъёмная сила на маневре. Через C_L и скоростной напор: n = (ρ·V²·S·C_Lmax)/(2·m·g). Подставь свои ρ, S, m — что получается на V_A?";
      return "Скорость сваливания: V_s = √(2·m·g / (ρ·S·C_Lmax)). Пришли свои числа — проверю ход, но итог посчитай сам и скажи размерность.";
    }

    /* ——— ПРЕПОДАВАТЕЛЬ ——— */
    function vTeacher(){
      V.append(head("Кабинет преподавателя · Вычислительная механика (К.М.02.01.02)","Приёмка артефактов и настройка ИИ",
        "Границы дисциплины (из карты владения): излагаете МКЭ, сетки, сходимость, верификацию. Не дублируете CFD и композиты — их владельцы другие."));
      V.append(el("div",{class:"cols c2"},
        card("Приёмка артефакта · «Стриж»: первая КЭ-модель узла",
          el("span",{class:"chip",style:"color:var(--amber)"},"V&V чек-лист"),
          el("p",{class:"muted",style:"font-size:var(--t-sm)"},"Расчётный артефакт не закрывается, пока не заполнена цепочка достоверности по ГОСТ Р 57700:"),
          vvList(),
          el("div",{class:"flex gap-m mt-m"},
            el("button",{class:"btn btn-primary",onclick:tryAccept},"Принять артефакт"),
            el("button",{class:"btn btn-ghost"},"Вернуть на доработку")),
          el("div",{id:"acceptMsg",class:"note mt-s"})),
        el("div",{class:"cols",style:"gap:1rem"},
          card("Настройка ИИ-наставника для моего задания",null,
            toggleRow("Наставник включён для задания","on"),
            el("div",{class:"li"},el("span",{},"Режим помощи"),
              el("span",{class:"tag chip",style:"color:var(--cyan)"},"подсказки по нарастающей")),
            el("div",{class:"li"},el("span",{},"Готовое решение оцениваемого задания"),
              el("span",{class:"tag chip",style:"color:var(--rose)"},"запрещено")),
            toggleRow("Показывать студенту эталонные задачи","on"),
            toggleRow("Разбор ошибок в ходе решения","on"),
            el("p",{class:"note mt-s"},"Принцип: ИИ помогает решить, решение принимает студент.")),
          card("Сигналы по группе · где буксуют",null,
            barLine("Сеточная сходимость",72,"var(--rose)"),
            barLine("Оценка погрешности",55,"var(--amber)"),
            barLine("Постановка граничных условий",30,"var(--lime)"),
            el("p",{class:"note mt-s"},"18 студентов · агрегировано, обезличенно. Тема «сходимость» — кандидат на доп. разбор."))
      )));
      // управление материалами
      V.append(teacherMaterials());
    }
    function teacherMaterials(){
      const c=COURSE_VM;
      const box=el("div",{class:"panel card hud",style:"margin-top:1rem"},
        el("h3",{}, el("span",{},"Материалы дисциплины · тема 8 «CFD»"),
          el("span",{class:"flex gap-s",style:"align-items:center"},
            el("span",{class:"chip",style:"color:var(--brand-2)"},c.materials.length+" опубликовано"),
            el("button",{class:"btn btn-primary btn-sm",onclick:()=>alert("Загрузка материала (демо): выбор файла → тип → тема → публикация. Файл попадёт в базу знаний и в RAG ИИ-тьютора.")},"+ Загрузить"))),
        el("p",{class:"note",style:"margin-bottom:1rem"},
          "Надстройка над Moodle: лекция и тест доступны студенту прямо в платформе; файлы дублируются в базу знаний и питают ИИ-тьютора."));
      c.materials.forEach(m=>{
        const act = m.act==="read"
          ? el("button",{class:"btn btn-ghost btn-sm",onclick:openLectureReader},"Читалка")
          : m.act==="quiz"
          ? el("button",{class:"btn btn-ghost btn-sm",onclick:openQuiz},"Тест")
          : el("a",{class:"btn btn-ghost btn-sm",href:m.file,download:""},"Файл");
        const vis=el("span",{class:"toggle on",title:"виден студентам",
          onclick:function(){this.classList.toggle("on");}});
        box.append(el("div",{class:"mat-row"},
          el("span",{class:"ftype",style:"--fc:"+ftColor(m.type)},ftLabel(m.type)),
          el("div",{class:"mat-info"},
            el("div",{style:"font-weight:560"},m.title),
            el("div",{class:"dim",style:"font-size:var(--t-xs)"},m.cat+(m.note?" · "+m.note:""))),
          vis, act));
      });
      return box;
    }
    function ftColor(t){ return {docx:"var(--brand)",pptx:"var(--amber)",lecture:"var(--brand-2)",quiz:"var(--violet)"}[t]||"var(--text-dim)"; }
    function ftLabel(t){ return {docx:"DOCX",pptx:"PPTX",lecture:"ЛЕКЦИЯ",quiz:"ТЕСТ"}[t]||"FILE"; }
    function vvList(){
      const items=["Сеточная сходимость показана (мин. 3 сетки)","Оценка погрешности приведена",
        "Проверка на эталонной задаче","Постановка соответствует физике","Данные модели оформлены как актив"];
      const box=el("div",{class:"vv"});
      items.forEach((t,i)=>{ const done=i<2;
        const row=el("div",{class:"vvrow"+(done?" done":"")},
          el("span",{class:"box",onclick:()=>{row.classList.toggle("done");}}, done?"✓":""),
          el("span",{},t));
        box.append(row); });
      return box;
    }
    function tryAccept(){
      const rows=[...document.querySelectorAll(".vvrow")];
      const all=rows.every(r=>r.classList.contains("done"));
      const m=document.getElementById("acceptMsg");
      if(all){ m.style.color="var(--ok)"; m.textContent="✓ Артефакт принят, компетенция подтверждена, двойник обновлён."; }
      else{ m.style.color="var(--rose)"; m.textContent="✕ Нельзя принять: не закрыта цепочка достоверности V&V ("+rows.filter(r=>!r.classList.contains("done")).length+" пункта)."; }
    }
    function toggleRow(t,on){ const tg=el("div",{class:"toggle"+(on?" on":""),onclick:function(){this.classList.toggle("on");}});
      return el("div",{class:"li"}, el("span",{},t), el("span",{class:"tag"},tg)); }
    function barLine(t,v,c){ return el("div",{style:"margin:.5rem 0"},
      el("div",{class:"flex between",style:"font-size:var(--t-sm);margin-bottom:.3rem"},el("span",{},t),el("span",{class:"mono"},v+"%")),
      el("div",{class:"bar"}, el("i",{style:"width:"+v+"%;background:"+c}))); }

    /* ——— РОП ——— */
    function vRop(){
      V.append(head("Кабинет РОП · руководитель образовательной программы","Трекинг когорты и развитие плана",
        "4 команды · 18 студентов · семестр 1"));
      V.append(el("div",{class:"kpi",style:"margin-bottom:1rem"},
        kpi("4","команды"), kpi("1","в зоне риска"), kpi("3","дубля тем найдено"), kpi("6","пробелов плана")));
      V.append(el("div",{class:"cols c2"},
        card("Тепловая карта · команды × стадии артефактов",null, heat()),
        el("div",{class:"cols",style:"gap:1rem"},
          card("РПД-контур · дубли против карты владения",el("span",{class:"chip",style:"color:var(--amber)"},"ИИ-разбор"),
            dupRow("CFD-раздел","К.М.03.01.05","дублируется в РПД К.М.03.01.04","risk"),
            dupRow("Метод конечных элементов","К.М.02.01.02","повтор в 2 РПД профиля","warn"),
            dupRow("Критерии разрушения композита","К.М.03.01.06","корректно, без повторов","ok"),
            el("p",{class:"note mt-s"},"ИИ находит — РОП подтверждает. Владелец темы читает, потребитель применяет.")),
          card("Развитие программы · пробелы плана",el("span",{class:"chip"},"из аналитики"),
            ...D.GAPS.map(g=>el("div",{class:"li"},
              el("span",{},g.t),
              el("span",{class:"tag chip",style:"color:"+(g.pr==="высокий"?"var(--rose)":"var(--amber)")},g.pr))))
      )));
    }
    function heat(){
      const teams=D.TEAMS;
      const t=el("table",{class:"heat"});
      const cols=["арт.С1","арт.С2","арт.С3","арт.С4"];
      t.append(el("tr",{}, el("th",{},"команда"), ...cols.map(c=>el("th",{},c)), el("th",{},"риск")));
      teams.forEach(tm=>{
        const row=el("tr",{}, el("td",{},tm.name));
        [1,2,3,4].forEach(s=>{
          let v = s<tm.stage?1 : s===tm.stage?tm.progress/100 : 0;
          const c = v>=.9?"var(--lime)": v>=.4?"var(--amber)": v>0?"var(--rose)":"var(--surface-2)";
          row.append(el("td",{}, el("span",{class:"cell",style:"background:"+c,title:Math.round(v*100)+"%"})));
        });
        row.append(el("td",{}, el("i",{class:"dot",style:"color:"+riskColor(tm.risk)})));
        t.append(row);
      });
      return t;
    }
    function dupRow(topic,owner,verdict,st){ return el("div",{class:"li"},
      el("span",{}, el("b",{},topic), el("div",{class:"note"},owner+" · "+verdict)),
      el("span",{class:"tag chip",style:"color:"+riskColor(st)}, el("i",{class:"dot"}),
        st==="ok"?"ок":st==="warn"?"проверить":"дубль")); }

    /* ——— ДИРЕКТОР ——— */
    function vDir(){
      V.append(head("Аналитика директора","Цифровой двойник программы","Соответствие план ↔ факт по когорте 2026"));
      V.append(el("div",{class:"kpi",style:"margin-bottom:1rem"},
        kpi("87%","успеваемость"), kpi("94%","вовлечённость"),
        kpi("4/4","команды в проекте"), kpi("62%","загрузка площадки")));
      V.append(el("div",{class:"cols c2"},
        card("Стадии проектов когорты",null,
          barLine("С1 — замысел и аванпроект",100,"var(--cyan)"),
          barLine("С2 — эскизный/технический",8,"var(--violet)"),
          barLine("С3 — образец",0,"var(--amber)"),
          barLine("С4 — валидация/защита",0,"var(--lime)"),
          el("p",{class:"note mt-s"},"Когорта на С1. Внутрисеместровый календарь С2 (аэродинамика→нагрузки→прочность→оптимизация) готов.")),
        el("div",{class:"cols",style:"gap:1rem"},
          card("Покрытие компетенций программой",null,
            barLine("Расчётно-инженерное ядро",88,"var(--lime)"),
            barLine("Цифровые двойники / V&V",64,"var(--amber)"),
            barLine("Автономность / GNC",38,"var(--rose)"),
            barLine("Организация производства",82,"var(--lime)")),
          card("Ресурсы площадки · использование",el("a",{href:"index.html",class:"chip"},"каталог"),
            barLine("Анизопринтинг / композиты",71,"var(--cyan)"),
            barLine("Испытательные машины",44,"var(--amber)"),
            barLine("HIL-стенд / CML-Bench",59,"var(--cyan)"),
            barLine("Лётная зона",22,"var(--lime)"))),
        card("Гранты, НИОКР, конкурсы · когорта",el("span",{class:"chip",style:"color:var(--cyan-dim)"},"скаут"),
          el("div",{class:"cols c3",style:"gap:1rem"},
            kpi("5","поданных заявок"), kpi("2","поддержано"), kpi("1.2М","₽ привлечено"))))
      );
      V.append(el("div",{class:"demo-banner mt-l"},"демо · цифры синтетические для показа руководству"));
    }

    render();
    mountFooter();
  </script>
</body>
</html>
